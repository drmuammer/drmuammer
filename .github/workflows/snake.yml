name: Generate Snake Animation

on:
  # Otomatik: her 12 saatte bir çalış
  schedule:
    - cron: "0 */12 * * *"
  # Manuel tetiklenebilir
  workflow_dispatch:
  # main branch'e her push'ta da çalışsın
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Generate snakes
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: drmuammer
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=14B8A6&color_dots=0F172A,155E75,0891B2,06B6D4,14B8A6

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
